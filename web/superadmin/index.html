<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SuperAdmin | Instituciones</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#197fe6",
              ink: "#0f172a",
              mist: "#f6f7f8",
            },
            fontFamily: {
              display: ["Manrope", "sans-serif"],
            },
            boxShadow: {
              soft: "0 25px 60px -30px rgba(15, 23, 42, 0.25)",
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-mist font-display text-ink">
    <div class="min-h-screen">
      <header class="bg-white border-b border-slate-200">
        <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
          <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-primary">school</span>
            <div>
              <p class="text-xs uppercase tracking-[0.2em] text-slate-400">SuperAdmin</p>
              <h1 class="text-lg font-bold">Instituciones</h1>
            </div>
          </div>
          <div class="flex items-center gap-3 text-sm text-slate-600">
            <span id="user-email">superadmin@firmaeducativa.com</span>
            <button class="rounded-full border border-slate-200 px-3 py-1 text-xs font-semibold" id="logout">
              Salir
            </button>
          </div>
        </div>
      </header>

      <main class="mx-auto flex max-w-6xl flex-col gap-6 px-6 py-8">
        <section class="grid gap-4 sm:grid-cols-3">
          <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-soft">
            <p class="text-xs uppercase tracking-[0.2em] text-slate-400">Instituciones</p>
            <p class="mt-2 text-3xl font-bold">2</p>
          </div>
          <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-soft">
            <p class="text-xs uppercase tracking-[0.2em] text-slate-400">Creditos totales</p>
            <p class="mt-2 text-3xl font-bold">2,300</p>
          </div>
          <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-soft">
            <p class="text-xs uppercase tracking-[0.2em] text-slate-400">Solicitudes activas</p>
            <p class="mt-2 text-3xl font-bold">4</p>
          </div>
        </section>

        <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-soft">
          <div class="flex flex-wrap items-center justify-between gap-3">
            <div>
              <h2 class="text-xl font-bold">Colegios registrados</h2>
              <p class="text-sm text-slate-500">Administracion global del sistema.</p>
            </div>
            <div class="flex flex-wrap gap-2">
              <input
                class="rounded-xl border border-slate-200 px-3 py-2 text-sm"
                id="org-name"
                placeholder="Nombre de institucion"
                type="text"
              />
              <input
                class="rounded-xl border border-slate-200 px-3 py-2 text-sm"
                id="org-credits"
                placeholder="Creditos iniciales"
                type="number"
              />
              <button class="rounded-xl bg-primary px-4 py-2 text-sm font-semibold text-white" id="create-org">
                Crear institucion
              </button>
            </div>
          </div>
          <div class="mt-4 overflow-x-auto">
            <table class="min-w-full text-left text-sm">
              <thead class="bg-slate-50 text-slate-500">
                <tr>
                  <th class="px-4 py-3">Institucion</th>
                  <th class="px-4 py-3">Estado</th>
                  <th class="px-4 py-3">Creditos</th>
                  <th class="px-4 py-3 text-right">Acciones</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-200" id="org-table">
                <tr><td class="px-4 py-3 text-sm text-slate-500" colspan="4">Cargando...</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-soft">
          <h2 class="text-xl font-bold">Crear usuario ADMIN</h2>
          <div class="mt-4 grid gap-3 sm:grid-cols-3">
            <input class="rounded-xl border border-slate-200 px-3 py-2 text-sm" id="user-email" placeholder="correo@colegio.edu" type="email" />
            <input class="rounded-xl border border-slate-200 px-3 py-2 text-sm" id="user-password" placeholder="Password" type="text" value="ChristianReinaldo" />
            <input class="rounded-xl border border-slate-200 px-3 py-2 text-sm" id="user-org" placeholder="Organization ID" type="text" />
          </div>
          <button class="mt-3 rounded-xl bg-primary px-4 py-2 text-sm font-semibold text-white" id="create-user">
            Crear admin
          </button>
          <p class="mt-2 text-xs text-slate-500" id="user-message"></p>
        </section>
      </main>
    </div>

    <script>
      const storedEmail = window.localStorage.getItem("auth_email");
      if (storedEmail) document.getElementById("user-email").textContent = storedEmail;
      const apiBase = window.API_BASE_URL || "http://localhost:8080";
      const orgTable = document.getElementById("org-table");

      async function loadOrganizations() {
        const res = await fetch(`${apiBase}/v1/organizations`);
        const data = await res.json();
        if (!data.items) return;
        orgTable.innerHTML = data.items
          .map((org) => {
            const credits = org.credits ? org.credits.balance : 0;
            return `
              <tr>
                <td class="px-4 py-3">
                  <div class="font-semibold">${org.name}</div>
                  <div class="text-xs text-slate-500">${org.id}</div>
                </td>
                <td class="px-4 py-3">
                  <span class="rounded-full bg-emerald-100 px-2 py-1 text-xs text-emerald-700">${org.status}</span>
                </td>
                <td class="px-4 py-3">${credits}</td>
                <td class="px-4 py-3 text-right">
                  <button class="rounded-lg border border-slate-200 px-3 py-1 text-xs font-semibold">Recargar</button>
                </td>
              </tr>
            `;
          })
          .join("");
      }

      document.getElementById("create-org").addEventListener("click", async () => {
        const name = document.getElementById("org-name").value.trim();
        const initialCredits = document.getElementById("org-credits").value;
        if (!name) return;
        await fetch(`${apiBase}/v1/organizations`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ name, initialCredits }),
        });
        document.getElementById("org-name").value = "";
        document.getElementById("org-credits").value = "";
        loadOrganizations();
      });

      document.getElementById("create-user").addEventListener("click", async () => {
        const email = document.getElementById("user-email").value.trim();
        const password = document.getElementById("user-password").value.trim();
        const organizationId = document.getElementById("user-org").value.trim();
        const message = document.getElementById("user-message");
        if (!email || !organizationId) {
          message.textContent = "Email y organizationId son requeridos.";
          return;
        }
        const res = await fetch(`${apiBase}/v1/users`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ email, password, role: "ADMIN", organizationId }),
        });
        const data = await res.json();
        if (!res.ok) {
          message.textContent = data.error || "Error al crear usuario.";
        } else {
          message.textContent = "Usuario creado.";
        }
      });

      document.getElementById("logout").addEventListener("click", () => {
        window.localStorage.removeItem("auth_email");
        window.localStorage.removeItem("auth_role");
        window.location.href = "/";
      });

      loadOrganizations();
    </script>
  </body>
</html>
