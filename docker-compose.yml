services:
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    image: colegios_api:local
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/colegios
      - REDIS_URL=redis://redis:6379
      - STORAGE_PATH=/data/storage
      - API_BASE_URL=http://api:8080
      - BATCH_PREP_CONCURRENCY=${BATCH_PREP_CONCURRENCY:-2}
      - PDF_CONCURRENCY=${PDF_CONCURRENCY:-1}
      - NODE_OPTIONS=--max-old-space-size=${API_MAX_OLD_SPACE_SIZE:-384}
      - TZ=America/Guayaquil
      - SUPERADMIN_INIT_PASSWORD=000000
    volumes:
      - ./data/storage:/data/storage
    mem_limit: 768m
    mem_reservation: 256m
    cpus: 1.00
    depends_on:
      - postgres
      - redis
    networks:
      - coolify
    expose:
      - '8080'
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 768M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - 'traefik.http.routers.${CLIENT_ID}-api.rule=Host(`${DOMAIN}`)'
      - 'traefik.http.routers.${CLIENT_ID}-api.entrypoints=https'
      - 'traefik.http.routers.${CLIENT_ID}-api.tls=true'
      - 'traefik.http.routers.${CLIENT_ID}-api.tls.certresolver=letsencrypt'
      - 'traefik.http.services.${CLIENT_ID}-api.loadbalancer.server.port=8080'
      - 'traefik.http.routers.${CLIENT_ID}-api-http.rule=Host(`${DOMAIN}`)'
      - 'traefik.http.routers.${CLIENT_ID}-api-http.entrypoints=http'
      - 'traefik.http.routers.${CLIENT_ID}-api-http.middlewares=${CLIENT_ID}-redirect'
      - 'traefik.http.middlewares.${CLIENT_ID}-redirect.redirectscheme.scheme=https'
      - 'traefik.http.middlewares.${CLIENT_ID}-redirect.redirectscheme.permanent=true'

  worker:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    image: colegios_worker:local
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/colegios
      - REDIS_URL=redis://redis:6379
      - STORAGE_PATH=/data/storage
      - NODE_OPTIONS=--max-old-space-size=${WORKER_MAX_OLD_SPACE_SIZE:-256}
      - TZ=America/Guayaquil
    volumes:
      - ./data/storage:/data/storage
    mem_limit: 384m
    mem_reservation: 128m
    cpus: 0.50
    depends_on:
      - postgres
      - redis
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8081/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M
        reservations:
          memory: 128M

  web:
    build:
      context: ./web
    restart: unless-stopped
    mem_limit: 96m
    mem_reservation: 32m
    cpus: 0.25
    depends_on:
      - api
    ports:
      - "5173:80"

  postgres:
    image: postgres:16
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 0.75
    shm_size: 128m
    environment:
      - POSTGRES_DB=colegios
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - TZ=America/Guayaquil
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - coolify

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 128m
    mem_reservation: 32m
    cpus: 0.25
    networks:
      - coolify

networks:
  coolify:
    name: ${COOLIFY_NETWORK_NAME:-coolify}
    external: ${COOLIFY_EXTERNAL_NETWORK:-true}
