version: '3.8'
services:
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    image: colegios_api:local
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/colegios
      - REDIS_URL=redis://redis:6379
      - STORAGE_PATH=/data/storage
      - TZ=America/Guayaquil
      - SUPERADMIN_INIT_PASSWORD=000000
    volumes:
      - ./data/storage:/data/storage
    depends_on:
      - postgres
      - redis
    networks:
      - coolify
    expose:
      - '8080'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - 'traefik.http.routers.${CLIENT_ID}-api.rule=Host(`${DOMAIN}`)'
      - 'traefik.http.routers.${CLIENT_ID}-api.entrypoints=https'
      - 'traefik.http.routers.${CLIENT_ID}-api.tls=true'
      - 'traefik.http.routers.${CLIENT_ID}-api.tls.certresolver=letsencrypt'
      - 'traefik.http.services.${CLIENT_ID}-api.loadbalancer.server.port=8080'
      - 'traefik.http.routers.${CLIENT_ID}-api-http.rule=Host(`${DOMAIN}`)'
      - 'traefik.http.routers.${CLIENT_ID}-api-http.entrypoints=http'
      - 'traefik.http.routers.${CLIENT_ID}-api-http.middlewares=${CLIENT_ID}-redirect'
      - 'traefik.http.middlewares.${CLIENT_ID}-redirect.redirectscheme.scheme=https'
      - 'traefik.http.middlewares.${CLIENT_ID}-redirect.redirectscheme.permanent=true'

  worker:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    image: colegios_worker:local
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/colegios
      - REDIS_URL=redis://redis:6379
      - STORAGE_PATH=/data/storage
      - TZ=America/Guayaquil
    volumes:
      - ./data/storage:/data/storage
    depends_on:
      - postgres
      - redis
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ./web:/usr/share/nginx/html:ro
    ports:
      - "5173:80"

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_DB=colegios
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - TZ=America/Guayaquil
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - coolify

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - coolify

networks:
  coolify:
    name: ${COOLIFY_NETWORK_NAME:-coolify}
    external: ${COOLIFY_EXTERNAL_NETWORK:-true}
