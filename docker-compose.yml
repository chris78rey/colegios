version: '3.8'
services:
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    image: colegios_api:local
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/colegios
      - REDIS_URL=redis://redis:6379
      - STORAGE_PATH=/data/storage
      - TZ=America/Guayaquil
      - SUPERADMIN_INIT_PASSWORD=000000
    volumes:
      - ./data/storage:/data/storage
    depends_on:
      - postgres
      - redis
    ports:
      - '8080:8080'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    image: colegios_worker:local
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/colegios
      - REDIS_URL=redis://redis:6379
      - STORAGE_PATH=/data/storage
      - TZ=America/Guayaquil
    volumes:
      - ./data/storage:/data/storage
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_DB=colegios
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - TZ=America/Guayaquil
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
